<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="card shadow-lg border-0 mt-4 mx-auto" style="max-width: 800px;">
        <div class="row g-0">
            <div class="col-md-5 bg-dark text-white d-flex align-items-center justify-content-center" style="min-height: 300px;">
                <div class="col-md-5 bg-white d-flex align-items-center justify-content-center p-4" style="min-height: 300px; border-right: 1px solid #dee2e6;">
                
                <img th:if="${producto.imagen != null and producto.imagen != ''}" 
                     th:src="@{/imagenes/{img} (img=${producto.imagen})}" 
                     class="img-fluid rounded" alt="Foto del producto" 
                     style="max-height: 350px; object-fit: contain;">

                <div th:unless="${producto.imagen != null and producto.imagen != ''}" class="text-center text-muted">
                    <span style="font-size: 5rem;">📷</span>
                    <p class="mt-2 text-muted">Imagen no disponible</p>
                </div>
            </div>
            </div>
            
            <div class="col-md-7">
                <div class="card-body p-5">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h2 class="card-title fw-bold" th:text="${producto.nombre}">Nombre</h2>
                        <span th:if="${producto.destacado == 1}" class="badge bg-warning text-dark fs-6">★ Destacado</span>
                    </div>
                    
                    <h3 class="text-primary fw-bold mb-4" th:text="'$' + ${producto.precio}">$0.00</h3>
                    
                    <h5 class="fw-bold">Especificaciones:</h5>
                    <p class="card-text text-secondary" th:text="${producto.descripcion != '' ? producto.descripcion : 'Sin descripción detallada.'}">Descripción</p>
                    
                    <ul class="list-group list-group-flush mt-4 mb-4">
                        <li class="list-group-item bg-transparent px-0">
                            <strong>Categoría:</strong> 
                            <span th:text="${producto.categoria != null ? producto.categoria.nombre : 'N/A'}">Cat</span>
                        </li>
                        <li class="list-group-item bg-transparent px-0">
                            <strong>Fecha de Registro:</strong> 
                            <span th:text="${#dates.format(producto.fechaRegistro, 'dd-MM-yyyy')}">Fecha</span>
                        </li>
                        <li class="list-group-item bg-transparent px-0">
                            <strong>Archivo de imagen base:</strong> 
                            <span th:text="${producto.imagen}">no-image.png</span>
                        </li>
                    </ul>

                    <a th:href="@{/productos/index}" class="btn btn-secondary w-100">Volver al Inventario</a>
                </div>
            </div>
        </div>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
