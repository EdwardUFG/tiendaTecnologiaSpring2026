<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="card shadow-lg border-0 mt-5 mx-auto mb-5" style="max-width: 800px;">
        <div class="row g-0">
            <div class="col-md-5 bg-white d-flex align-items-center justify-content-center p-4" style="min-height: 300px; border-right: 1px solid #dee2e6;">
                <img th:src="@{/imagenes/{img} (img=${producto.imagen})}" 
                     class="img-fluid rounded" alt="Foto del producto" 
                     style="max-height: 350px; object-fit: contain;">
            </div>
            
            <div class="col-md-7">
                <div class="card-body p-5">
                    <h2 class="card-title fw-bold mb-2" th:text="${producto.nombre}">Nombre</h2>
                    <h3 class="text-primary fw-bold mb-4" th:text="'$' + ${producto.precio}">$0.00</h3>
                    
                    <h5 class="fw-bold">Especificaciones:</h5>
                    <p class="card-text text-secondary mb-4" th:text="${producto.descripcion != '' ? producto.descripcion : 'Sin descripción detallada.'}">Descripción</p>
                    
                    <ul class="list-group list-group-flush mb-4">
                        <li class="list-group-item bg-transparent px-0">
                            <strong>Categoría:</strong> 
                            <span th:text="${producto.categoria != null ? producto.categoria.nombre : 'N/A'}">Cat</span>
                        </li>
                        <li class="list-group-item bg-transparent px-0">
                            <strong>Fecha de Registro:</strong> 
                            <span th:text="${#dates.format(producto.fechaRegistro, 'dd-MM-yyyy')}">Fecha</span>
                        </li>
                    </ul>

                    <a th:href="@{/productos/index}" class="btn btn-secondary w-100">Volver al Inventario</a>
                </div>
            </div>
        </div>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
