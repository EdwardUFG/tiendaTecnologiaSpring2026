<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Inventario de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
    
    <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
        <h2>Inventario de Productos</h2>
        <a th:href="@{/productos/create}" class="btn btn-success">+ Registrar Nuevo</a>
    </div>

    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="prod : ${productos}">
            <div class="card h-100 shadow-sm border-0">
            <img th:if="${prod.imagen != null and prod.imagen != ''}" 
                     th:src="@{/imagenes/{img} (img=${prod.imagen})}" 
                     class="card-img-top" alt="Foto del producto" 
                     style="height: 200px; object-fit: contain; background-color: #f8f9fa; padding: 15px;">
                
                <div th:unless="${prod.imagen != null and prod.imagen != ''}" 
                     class="bg-secondary text-white text-center py-4 rounded-top" 
                     style="height: 200px; display: flex; align-items: center; justify-content: center;">
                    <span class="fs-1">📦</span>
                </div>
                <div class="card-body text-center">
                    <h5 class="card-title text-truncate" th:text="${prod.nombre}">Nombre</h5>
                    <span class="badge bg-dark mb-2" th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin Categoría'}">Categoría</span>
                    <p class="text-primary fw-bold fs-4 mb-3" th:text="'$' + ${prod.precio}">$0.00</p>
                    
                    <a th:href="@{/productos/detalle/{id} (id=${prod.id})}" class="btn btn-outline-primary btn-sm w-100">
                        Ver Especificaciones
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
