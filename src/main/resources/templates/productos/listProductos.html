<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
    
    <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
        <h2>Inventario de Productos</h2>
        <a th:href="@{/productos/create}" class="btn btn-success fw-bold">+ Registrar Nuevo</a>
    </div>

    <div class="row row-cols-1 row-cols-md-4 g-4 mb-5">
        <div class="col" th:each="prod : ${productos}">
            <div class="card h-100 shadow-sm border-0">
                
                <img th:src="@{/imagenes/{img} (img=${prod.imagen})}" 
                     class="card-img-top" alt="Foto del producto" 
                     style="height: 200px; object-fit: contain; background-color: #f8f9fa; padding: 15px;">

                <div class="card-body text-center d-flex flex-column">
                    <h5 class="card-title text-truncate fw-bold" th:text="${prod.nombre}">Nombre</h5>
                    <span class="badge bg-dark mb-2 mx-auto" th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin Categoría'}">Categoría</span>
                    <p class="text-primary fw-bold fs-4 mb-3" th:text="'$' + ${prod.precio}">$0.00</p>
                    
                    <div class="mt-auto">
                        <a th:href="@{/productos/detalle/{id} (id=${prod.id})}" class="btn btn-outline-primary btn-sm w-100 mb-2">
                            Ver Especificaciones
                        </a>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/productos/edit/{id} (id=${prod.id})}" class="btn btn-warning btn-sm w-50 me-1">✏️ Editar</a>
                            <a th:href="@{/productos/delete/{id} (id=${prod.id})}" class="btn btn-danger btn-sm w-50 ms-1" onclick="return confirm('¿Seguro que deseas eliminar este producto?')">🗑️ Eliminar</a>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
