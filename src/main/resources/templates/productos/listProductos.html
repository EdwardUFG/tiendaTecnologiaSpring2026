<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Inventario de Productos</h2>
        <a th:href="@{/productos/create}" class="btn btn-primary">Nuevo Producto</a>
    </div>
    <table class="table table-hover bg-white shadow-sm rounded">
        <thead class="table-dark">
            <tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Categoría</th></tr>
        </thead>
        <tbody>
            <tr th:each="prod : ${productos}">
                <td th:text="${prod.id}">1</td>
                <td th:text="${prod.nombre}">Producto</td>
                <td th:text="'$' + ${prod.precio}">$0.0</td>
                <td th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin Categoría'}">Categoría</td>
            </tr>
        </tbody>
    </table>
    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
