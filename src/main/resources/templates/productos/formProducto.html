<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
   
    <div class="card p-4 shadow-sm mx-auto mt-4 mb-5" style="max-width: 600px;">
        <h3 class="mb-3">Registrar / Editar Producto</h3>
        
        <form th:action="@{/productos/save}" method="post" th:object="${producto}" enctype="multipart/form-data">
            
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{imagen}">
            
            <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger" role="alert">
                Por favor corrija los siguientes errores:
                <ul><li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li></ul>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Nombre del Producto</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="3"></textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Precio ($)</label>
                    <input type="text" th:field="*{precio}" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Fecha (dd-MM-yyyy)</label>
                    <input type="text" th:field="*{fechaRegistro}" class="form-control" placeholder="30-05-2026" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Categoría</label>
                <select th:field="*{categoria.id}" class="form-select" required>
                    <option value="">-- Seleccione una Categoría --</option>
                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}"></option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold">Imagen del Producto</label>
                <input type="file" name="archivoImagen" class="form-control" accept="image/png, image/jpeg">
                <small class="text-muted">Si estás editando y no subes una foto nueva, se conservará la anterior.</small>
            </div>
            
            <button type="submit" class="btn btn-success w-100">Guardar Producto</button>
        </form>
    </div>
    
    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
