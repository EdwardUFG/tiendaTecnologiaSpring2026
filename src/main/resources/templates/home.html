<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AudioTech Store - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <main class="container">
        <div class="p-5 mb-4 bg-dark text-white rounded-3">
            <div class="container-fluid py-5">
                <h1 class="display-5 fw-bold">Bienvenidos a AudioTech</h1>
                <p class="col-md-8 fs-4">El mejor hardware, auriculares inalámbricos y componentes tecnológicos de El Salvador.</p>
            </div>
        </div>

        <h2 class="mb-4">Catálogo de Productos</h2>
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col" th:each="prod : ${productos}">
               <div class="card h-100 shadow-sm border-0">
                    <img th:if="${prod.imagen != null and prod.imagen != ''}" 
                         th:src="@{/imagenes/{img} (img=${prod.imagen})}" 
                         class="card-img-top" alt="Foto" 
                         style="height: 220px; object-fit: contain; padding: 1rem; background-color: #fff;">
                         
                    <div th:unless="${prod.imagen != null and prod.imagen != ''}" class="bg-light text-center py-5 rounded-top">
                         <span style="font-size: 4rem;">📦</span>
                    </div>

                    <div class="card-body">
                        <h5 class="card-title text-truncate" th:text="${prod.nombre}">Nombre Producto</h5>
                        <p class="card-text text-muted small text-truncate" th:text="${prod.descripcion}">Descripcion corta</p>
                        <span class="badge bg-secondary mb-2" th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin categoria'}">Categoria</span>
                        <h4 class="text-primary fw-bold" th:text="'$' + ${prod.precio}">$0.00</h4>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
