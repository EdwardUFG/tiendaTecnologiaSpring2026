<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Control de Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>

    <div class="d-flex justify-content-between align-items-center mb-3 mt-4">
        <h2>Control de Categorías</h2>
        <a th:href="@{/categorias/create}" class="btn btn-primary">Nueva Categoría</a>
    </div>

    <div th:if="${alerta != null}" class="alert alert-warning alert-dismissible fade show shadow-sm" role="alert">
        <strong>Atención:</strong> <span th:text="${alerta}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <table class="table table-hover bg-white shadow-sm rounded mt-3">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categorias}">
                <td th:text="${cat.id}">1</td>
                <td th:text="${cat.nombre}">Nombre</td>
                <td th:text="${cat.descripcion}">Desc</td>
                <td>
                    <a th:href="@{/categorias/edit/{id} (id=${cat.id})}" class="btn btn-warning btn-sm">✏️ Editar</a>
                    <a th:href="@{/categorias/delete/{id} (id=${cat.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Estás seguro de eliminar esta categoría?')">🗑️ Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
