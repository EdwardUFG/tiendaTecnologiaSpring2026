<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Control de Categorías</h2>
        <a th:href="@{/categorias/create}" class="btn btn-primary">Nueva Categoría</a>
    </div>
    <table class="table table-hover bg-white shadow-sm rounded">
        <thead class="table-dark">
            <tr><th>ID</th><th>Nombre</th><th>Descripción</th></tr>
        </thead>
        <tbody>
            <tr th:each="cat : ${categorias}">
                <td th:text="${cat.id}">1</td>
                <td th:text="${cat.nombre}">Nombre</td>
                <td th:text="${cat.descripcion}">Desc</td>
            </tr>
        </tbody>
    </table>
    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
