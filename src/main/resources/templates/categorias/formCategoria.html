<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Nueva Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container bg-light">
    <header th:insert="~{fragments/menu :: menu-principal}"></header>
    
    <div class="card p-4 shadow-sm mx-auto mt-4" style="max-width: 500px;">
        <h3 class="mb-3">Crear / Editar Categoría</h3>
        
        <form th:action="@{/categorias/save}" method="post" th:object="${categoria}">
            
            <input type="hidden" th:field="*{id}">
            
            <div class="mb-3">
                <label class="form-label">Nombre de Categoría</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea th:field="*{descripcion}" class="form-control" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">Guardar Categoría</button>
        </form>
    </div>
    
    <footer th:insert="~{fragments/footer :: pie-pagina}"></footer>
</body>
</html>
